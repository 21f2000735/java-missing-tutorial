<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=./index.html#home">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting - Java Missing Tutorial</title>
  <style>
    :root{--bg:#f5efe3;--panel:#fffaf2;--text:#2d2418;--muted:#6d5a46;--line:rgba(54,43,28,.12);--accent:#8d4300;--shadow:0 18px 42px rgba(60,42,18,.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#fcf5eb 0%,#f3eadb 100%);color:var(--text)}
    main{min-height:100vh;display:grid;place-items:center;padding:1.25rem}
    .panel{max-width:40rem;background:var(--panel);border:1px solid var(--line);border-radius:1.35rem;padding:2rem;box-shadow:var(--shadow)}
    .eyebrow{text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-size:.72rem;font-weight:700;margin:0 0 .75rem}
    h1{font-family:Georgia,serif;line-height:1.05;margin:.2rem 0 1rem}
    p{line-height:1.75;color:var(--muted)}
    a{display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;text-decoration:none;background:white;border:1px solid var(--line);padding:.78rem 1rem;border-radius:999px;color:var(--text)}
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <p class="eyebrow">Java Missing Tutorial</p>
      <h1>Taking you back to the main learning site.</h1>
      <p>
        This route is handled by the static-site fallback. If the automatic redirect does not finish,
        use the button below to continue into the main app.
      </p>
      <a href="./index.html#home">Open the home page</a>
    </section>
  </main>
</body>
</html>
