<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" fill="none">
  <rect width="960" height="520" rx="28" fill="#FFF8EE"/>
  <rect x="24" y="24" width="912" height="472" rx="24" fill="#F6ECDE" stroke="#D9B38C"/>
  <text x="48" y="76" fill="#3A2B1B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34" font-weight="700">Why threads feel different</text>
  <text x="48" y="112" fill="#6C5843" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19">Two flows of work can progress independently, so output order is not guaranteed.</text>

  <rect x="60" y="170" width="380" height="240" rx="22" fill="#FFFDF8" stroke="#D9B38C"/>
  <text x="86" y="212" fill="#8D4300" font-family="IBM Plex Sans, Arial, sans-serif" font-size="25" font-weight="700">Main thread</text>
  <line x1="104" y1="248" x2="104" y2="372" stroke="#AF5B0C" stroke-width="8" stroke-linecap="round"/>
  <circle cx="104" cy="278" r="12" fill="#AF5B0C"/>
  <circle cx="104" cy="332" r="12" fill="#AF5B0C"/>
  <text x="132" y="284" fill="#3A2B1B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">start worker</text>
  <text x="132" y="338" fill="#3A2B1B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">keep doing other work</text>

  <rect x="514" y="170" width="380" height="240" rx="22" fill="#FFFDF8" stroke="#D9B38C"/>
  <text x="540" y="212" fill="#3A6A57" font-family="IBM Plex Sans, Arial, sans-serif" font-size="25" font-weight="700">Worker thread</text>
  <line x1="558" y1="248" x2="558" y2="372" stroke="#3A6A57" stroke-width="8" stroke-linecap="round"/>
  <circle cx="558" cy="290" r="12" fill="#3A6A57"/>
  <circle cx="558" cy="346" r="12" fill="#3A6A57"/>
  <text x="586" y="296" fill="#3A2B1B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">load report</text>
  <text x="586" y="352" fill="#3A2B1B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">finish later</text>

  <text x="80" y="454" fill="#5F4E3C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19">Key idea: concurrency introduces scheduling freedom, which means visibility and coordination matter.</text>
</svg>
