<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 330" role="img" aria-labelledby="title desc">
  <title id="title">Class loading lifecycle</title>
  <desc id="desc">A left-to-right timeline shows loading, linking, and initialization, with field access triggering static initialization.</desc>
  <rect width="780" height="330" fill="#fbf6ee"/>
  <line x1="90" y1="180" x2="700" y2="180" stroke="#6d5a46" stroke-width="4"/>
  <rect x="92" y="126" width="150" height="78" rx="18" fill="#f2d7b8" stroke="#af5b0c" stroke-width="2"/>
  <text x="124" y="170" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#402b12">Loading</text>
  <rect x="306" y="126" width="150" height="78" rx="18" fill="#f1ead7" stroke="#8b7a5d" stroke-width="2"/>
  <text x="339" y="170" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#4a4031">Linking</text>
  <rect x="520" y="126" width="170" height="78" rx="18" fill="#d8ece3" stroke="#3a6a57" stroke-width="2"/>
  <text x="544" y="170" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#203d33">Initialization</text>
  <path d="M534 82 C516 98, 505 110, 500 124" fill="none" stroke="#3a6a57" stroke-width="3"/>
  <text x="438" y="70" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#315848">Trigger: access</text>
  <text x="408" y="92" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#315848">CustomerConfig.DEFAULT_REGION</text>
  <text x="90" y="246" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#6d5a46">Loading: class becomes known</text>
  <text x="306" y="246" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#6d5a46">Linking: prepare it</text>
  <text x="520" y="246" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#6d5a46">Initialization: run static setup</text>
</svg>
