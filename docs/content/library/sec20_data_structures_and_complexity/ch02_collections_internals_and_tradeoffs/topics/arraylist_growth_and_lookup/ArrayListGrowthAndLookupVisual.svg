<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">ArrayList growth and lookup visual</title>
  <desc id="desc">Comic-style diagram showing direct index lookup and occasional resize-copy work in ArrayList.</desc>
  <rect width="980" height="560" rx="28" fill="#fcf5eb"/>
  <rect x="28" y="28" width="924" height="504" rx="24" fill="#fffaf2" stroke="#d8c7ae" stroke-width="2"/>
  <text x="64" y="86" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34" font-weight="700" fill="#2d2418">ArrayList in one look</text>
  <text x="64" y="118" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" fill="#6d5a46">Fast index lookup, cheap common appends, occasional expensive resize.</text>

  <rect x="62" y="154" width="390" height="316" rx="22" fill="#f7ecda" stroke="#d8c7ae"/>
  <text x="88" y="194" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#8d4300">Panel 1: Backing array</text>
  <g font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#2d2418">
    <rect x="92" y="228" width="58" height="58" rx="10" fill="#f2d2b0" stroke="#8d4300"/>
    <rect x="154" y="228" width="58" height="58" rx="10" fill="#f2d2b0" stroke="#8d4300"/>
    <rect x="216" y="228" width="58" height="58" rx="10" fill="#f2d2b0" stroke="#8d4300"/>
    <rect x="278" y="228" width="58" height="58" rx="10" fill="#f2d2b0" stroke="#8d4300"/>
    <rect x="340" y="228" width="58" height="58" rx="10" fill="#f2d2b0" stroke="#8d4300"/>
    <text x="109" y="264">0</text>
    <text x="171" y="264">1</text>
    <text x="233" y="264">2</text>
    <text x="295" y="264">3</text>
    <text x="357" y="264">4</text>
  </g>
  <path d="M 200 326 C 240 326, 260 326, 300 326" stroke="#3a6a57" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="100" y="360" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" fill="#2d2418">Jump straight to index 4.</text>
  <text x="100" y="392" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" fill="#2d2418">That is why indexed read is fast.</text>

  <rect x="500" y="154" width="390" height="316" rx="22" fill="#edf5ef" stroke="#bed2c7"/>
  <text x="526" y="194" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#3a6a57">Panel 2: Resize moment</text>
  <g>
    <rect x="530" y="228" width="40" height="58" rx="10" fill="#cfe5d7" stroke="#3a6a57"/>
    <rect x="574" y="228" width="40" height="58" rx="10" fill="#cfe5d7" stroke="#3a6a57"/>
    <rect x="618" y="228" width="40" height="58" rx="10" fill="#cfe5d7" stroke="#3a6a57"/>
    <rect x="662" y="228" width="40" height="58" rx="10" fill="#cfe5d7" stroke="#3a6a57"/>
    <rect x="706" y="228" width="40" height="58" rx="10" fill="#cfe5d7" stroke="#3a6a57"/>
    <rect x="750" y="228" width="40" height="58" rx="10" fill="#cfe5d7" stroke="#3a6a57"/>
    <rect x="794" y="228" width="40" height="58" rx="10" fill="#fff" stroke="#8fa79a" stroke-dasharray="6 5"/>
  </g>
  <path d="M 548 310 C 592 344, 640 344, 684 310" stroke="#af5b0c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="528" y="364" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" fill="#2d2418">Most appends are cheap.</text>
  <text x="528" y="396" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" fill="#2d2418">Occasional resize copies old items.</text>

  <rect x="62" y="488" width="828" height="28" rx="14" fill="#f2d2b0"/>
  <text x="82" y="508" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#2d2418">Rule: great for ordered data and index lookup; less great for frequent middle insertions.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#af5b0c"/>
    </marker>
  </defs>
</svg>
