  <text x="48" y="76" fill="#3A2B1B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="34" font-weight="700">HashMap collisions in one look</text>
  <text x="48" y="112" fill="#6C5843" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19">Fast lookup usually works because keys spread out. Collisions mean more than one key lands together.</text>

