name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Validate naming
        run: python3 scripts/validate_naming.py

      - name: Compile Java sources
        run: |
          javac --enable-preview --release 25 -d /tmp/java-missing-main $(find src/main/java -name '*.java' | sort)

      - name: Build content and site
        run: npm run build
